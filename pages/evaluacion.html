<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEMM | Evaluacion</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo-band"><a class="logo" href="../index.html">YEMM</a></div>
    <nav class="main-nav container">
      <a href="../index.html">Inicio</a>
      <a href="./dashboard.html">Dashboard</a>
      <details class="modules-dropdown">
        <summary>Modulos</summary>
        <div class="modules-dropdown-menu" role="menu">
          <a href="./modulo-1.html">Modulo 1</a>
          <a href="./modulo-2.html">Modulo 2</a>
          <a href="./modulo-3.html">Modulo 3</a>
        </div>
      </details>
      <a class="is-active" href="./evaluacion.html">Evaluacion</a>
      <a href="./perfil.html">Perfil</a>
      <a href="./login.html">Login</a>
      <a href="./register.html">Registro</a>
    </nav>
  </header>

  <!-- PROGRESO -->
  <section class="card card-muted" style="margin-bottom: 1rem;">
    <div class="row">
      <span class="badge" id="badgePregunta">Pregunta 1 de 15</span>
      <span id="porcentaje">7% completado</span>
    </div>
    <div class="progress-track" style="margin-top: 0.6rem;">
      <div class="progress-bar" id="barra" style="width: 7%;"></div>
    </div>
  </section>

  <!-- PREGUNTA -->
  <section class="card" style="margin-bottom: 1rem;">
    <h3 id="modulo">Módulo:</h3>
    <h2 id="pregunta" style="margin-top: 0.4rem;">Cargando pregunta...</h2>

    <form id="formPregunta" class="grid">
      <div id="opciones"></div>

      <div class="row" style="margin-top: 0.4rem;">
        <button class="btn btn-outline" id="btnAnterior" type="button" disabled>Anterior</button>
        <button class="btn btn-purple" id="btnSiguiente" type="button">Siguiente</button>
      </div>
    </form>

    <p id="alerta" style="color:#dc2626; display:none; margin-top:0.5rem;">
      Debes seleccionar una respuesta antes de continuar.
    </p>
  </section>

  <section class="grid cols-3">
    <article class="card">
      <div class="kpi">Respondidas</div><strong id="kpiResp" style="color:#6b21a8; font-size:1.5rem;">0</strong>
    </article>
    <article class="card">
      <div class="kpi">Restantes</div><strong id="kpiRest" style="color:#6b21a8; font-size:1.5rem;">15</strong>
    </article>
    <article class="card">
      <div class="kpi">Total</div><strong style="color:#6b21a8; font-size:1.5rem;">15</strong>
    </article>
  </section>
  </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>2026 YEMM</p>
    </div>
  </footer>

  <script>
    const preguntas = [
      // MÓDULO 1
      { modulo: "Lógica y Conjuntos", texto: "¿Cuál es el valor de p ∧ ¬p?", opciones: ["Verdadero", "Falso", "Depende", "No se puede determinar"], correcta: "Falso" },
      { modulo: "Lógica y Conjuntos", texto: "¿Qué representa A ∩ B?", opciones: ["Unión", "Intersección", "Diferencia", "Complemento"], correcta: "Intersección" },
      { modulo: "Lógica y Conjuntos", texto: "¿Qué representa A ∪ B?", opciones: ["Unión", "Intersección", "Diferencia", "Complemento"], correcta: "Unión" },
      { modulo: "Lógica y Conjuntos", texto: "Tabla de verdad de ¬p", opciones: ["V→F, F→V", "V→V, F→F", "Depende", "No se sabe"], correcta: "V→F, F→V" },
      { modulo: "Lógica y Conjuntos", texto: "Conjuntos disjuntos son:", opciones: ["Sin elementos en común", "Iguales", "Uno contiene al otro", "Infinitos"], correcta: "Sin elementos en común" },

      // MÓDULO 2 
      { modulo: "Teoría de Números", texto: "¿Qué significa a|b?", opciones: ["a divide exactamente a b", "a es mayor que b", "b es múltiplo de 10", "a y b son primos"], correcta: "a divide exactamente a b" },
      { modulo: "Teoría de Números", texto: "¿Cuál de estos es un número primo?", opciones: ["4", "6", "9", "13"], correcta: "13" },
      { modulo: "Teoría de Números", texto: "¿Cuál es el residuo de 9 mod 4?", opciones: ["0", "1", "2", "3"], correcta: "1" },
      { modulo: "Teoría de Números", texto: "¿Cuál es el residuo de 2 mod 2?", opciones: ["0", "1", "2", "No existe"], correcta: "0" },
      { modulo: "Teoría de Números", texto: "¿Cuál de estos números es compuesto?", opciones: ["2", "3", "5", "15"], correcta: "15" },

      // MÓDULO 3 
      { modulo: "Congruencias Lineales", texto: "¿Qué significa a ≡ b (mod m)?", opciones: ["a y b tienen el mismo residuo", "a es mayor que b", "m es primo", "a es múltiplo de b"], correcta: "a y b tienen el mismo residuo" },
      { modulo: "Congruencias Lineales", texto: "¿Cuál es el residuo de 7 mod 9?", opciones: ["0", "7", "2", "1"], correcta: "7" },
      { modulo: "Congruencias Lineales", texto: "¿Cuál es el residuo de 22 mod 4?", opciones: ["0", "1", "2", "3"], correcta: "2" },
      { modulo: "Congruencias Lineales", texto: "¿Cuál congruencia es verdadera?", opciones: ["4 ≡ 3 (mod 2)", "11 ≡ 1 (mod 5)", "7 ≡ 0 (mod 7)", "5 ≡ 3 (mod 1)"], correcta: "7 ≡ 0 (mod 7)" },
      { modulo: "Congruencias Lineales", texto: "¿Cuál número es congruente con 4 mod 12?", opciones: ["10", "16", "20", "22"], correcta: "16" },
    ];
    
    let index = 0;
    let respuestas = Array(15).fill(null);

    const modulo = document.getElementById("modulo");
    const pregunta = document.getElementById("pregunta");
    const opcionesDiv = document.getElementById("opciones");
    const alerta = document.getElementById("alerta");
    const badge = document.getElementById("badgePregunta");
    const porcentaje = document.getElementById("porcentaje");
    const barra = document.getElementById("barra");
    const kpiResp = document.getElementById("kpiResp");
    const kpiRest = document.getElementById("kpiRest");

    function cargarPregunta() {
      const p = preguntas[index];

      modulo.textContent = "Módulo: " + p.modulo;
      pregunta.textContent = p.texto;

      opcionesDiv.innerHTML = "";
      p.opciones.forEach(op => {
        opcionesDiv.innerHTML += `
    <label class="opcion">
      <input type="radio" name="respuesta" value="${op}">
      <span>${op}</span>
    </label>
  `;
      });


      badge.textContent = `Pregunta ${index + 1} de 15`;
      porcentaje.textContent = `${Math.round(((index + 1) / 15) * 100)}% completado`;
      barra.style.width = `${((index + 1) / 15) * 100}%`;

      document.getElementById("btnAnterior").disabled = index === 0;
      document.getElementById("btnSiguiente").textContent = index === 14 ? "Ver resultados" : "Siguiente";

      alerta.style.display = "none";
    }

    function validar() {
      const seleccion = document.querySelector("input[name='respuesta']:checked");
      if (!seleccion) {
        alerta.style.display = "block";
        return false;
      }
      respuestas[index] = seleccion.value;
      return true;
    }

    document.getElementById("btnSiguiente").addEventListener("click", () => {
      if (!validar()) return;

      if (index === 14) {
        localStorage.setItem("respuestas", JSON.stringify(respuestas));
        window.location.href = "./evaluacion-resultado.html";
        return;
      }



      index++;
      actualizarKPIs();
      cargarPregunta();
    });

    document.getElementById("btnAnterior").addEventListener("click", () => {
      if (index > 0) {
        index--;
        cargarPregunta();
      }
    });

    function actualizarKPIs() {
      const respondidas = respuestas.filter(r => r !== null).length;
      kpiResp.textContent = respondidas;
      kpiRest.textContent = 15 - respondidas;
    }

    cargarPregunta();
  </script>

</body>

</html>
